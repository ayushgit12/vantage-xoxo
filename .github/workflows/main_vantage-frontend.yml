name: Build and deploy Next.js app to Azure Web App - vantage-frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Next.js app
        working-directory: frontend
        run: npm run build

      # ✅ Upload ONLY frontend content
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-app
          path: frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: nextjs-app

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0A5FBE2A316E4F8A8C7B109557DEF71A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F713B53E93674D29972B4A79862CC730 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_11F5D52F055B43C1A630466B5EB43BCC }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'vantage-frontend'
          slot-name: 'Production'
          package: .
